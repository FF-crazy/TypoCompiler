name: Rust Cross Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: typo_compiler-linux-amd64
            binary_name: typo_compiler
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: typo_compiler-windows-amd64
            binary_name: typo_compiler
            binary_ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: typo_compiler-darwin-arm64
            binary_name: typo_compiler
            binary_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - name: Run tests (native target only)
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: cargo test --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}${{ matrix.binary_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename binaries
        run: |
          mkdir -p dist/release
          cp dist/typo_compiler-linux-amd64/typo_compiler dist/release/typo_compiler-linux-amd64
          cp dist/typo_compiler-windows-amd64/typo_compiler.exe dist/release/typo_compiler-windows-amd64.exe
          cp dist/typo_compiler-darwin-arm64/typo_compiler dist/release/typo_compiler-darwin-arm64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/typo_compiler-linux-amd64
            dist/release/typo_compiler-windows-amd64.exe
            dist/release/typo_compiler-darwin-arm64
